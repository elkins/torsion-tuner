name: Lint and Format

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install black ruff mypy
        
    - name: Check Formatting (Black)
      run: black --check torsiontuner/ tests/
      
    - name: Lint (Ruff)
      run: ruff check torsiontuner/ tests/
      
    - name: Type Check (Mypy)
      run: mypy torsiontuner/
