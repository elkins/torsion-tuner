name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest
        # Install the submodule/dependency manually if needed, 
        # or ensure pyproject.toml handles it. 
        # Since we have it in requirements.txt/pyproject.toml:
        pip install -e ./diff-biophys
        
    - name: Run Tests
      run: |
        pytest tests/
